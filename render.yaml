services:
  - type: web
    name: file-protection-system
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn web_app:app --workers 1 --threads 4"
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.12
